<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Live Overlay</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay">

    <div class="top-bar">
        <div class="goal">
            1H • 40 392 / 50 000 LIKES
        </div>
    </div>

    <div class="left-panel">
        <div class="gift">⭐ Top Streak</div>
        <div class="gift">🎁 -15 min</div>
        <div class="gift">🔥 +1v1</div>
        <div class="gift">🦒 +1H Viewers</div>
        <div class="gift">🎤 +Je Chante</div>
        <div class="gift">✏️ +Rename</div>
    </div>

    <div class="right-panel">
        <div class="gift">💎 Top Gift</div>
        <div class="gift">🏆 +7 min</div>
        <div class="gift">🎟️ +1v1</div>
        <div class="gift">✨ +1H Viewers</div>
        <div class="gift">🎤 +Je Chante</div>
        <div class="gift">✏️ +Rename</div>
    </div>

    <div class="timer">
        16:04
    </div>

</div>

</body>
</html>
